<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Projeto | Lucas Pablo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./projeto.css" />
</head>

<body>

  <main id="project-container" class="project-page">
    <!-- Conteúdo carregado via JavaScript -->
  </main>

  <script type="module">
    import { projects } from '../data/projects.js';

    const params = new URLSearchParams(window.location.search);
    const projectId = Number(params.get('id'));

    const project = projects.find(p => p.id === projectId);
    const container = document.getElementById('project-container');

    if (!project) {
      container.innerHTML = `
        <section class="project-header">
          <h1>Projeto não encontrado</h1>
          <a href="../index.html" class="back-link">← Voltar para o Início</a>
        </section>
      `;
    } else {
      document.title = `${project.title} | Lucas Pablo`;

      container.innerHTML = `
        <a href="../index.html" class="back-link">← Voltar para o Início</a>
        
        <header class="project-header">
          <h1>${project.title}</h1>
          <div class="project-meta">
            ${project.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('')}
          </div>
        </header>

        ${
          project.image
            ? `
            <div class="project-hero-img">
              <img src="../${project.image}" alt="${project.title}">
            </div>
            `
            : ''
        }

        <div class="project-grid">
          
          <div class="project-card">
            <section class="project-section">
              <h2>🎯 O Desafio</h2>
              <p>${project.challenge}</p>
            </section>
          </div>

          <div class="project-card">
            <section class="project-section">
              <h2>💡 A Solução</h2>
              <p>${project.solution}</p>
            </section>
          </div>

          <div class="project-card">
            <section class="project-section">
              <h2>🚀 Resultados</h2>
              <p>${project.results}</p>
            </section>
          </div>

          <div class="project-card">
            <section class="project-section">
              <h2>🛠️ Metodologia Técnica</h2>
              <p>${project.method}</p>
            </section>
          </div>

        </div>

        <div class="project-links">
          ${
            project.liveUrl
              ? `
              <a
                href="${project.liveUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="btn-primary"
              >
                Ver Dashboard / Aplicação
              </a>
              `
              : ''
          }
          ${
            project.githubUrl
              ? `
              <a
                href="${project.githubUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="btn-primary"
                style="background: #21262d; color: #fff; border: 1px solid #30363d;"
              >
                Código no GitHub
              </a>
              `
              : ''
          }
        </div>
      `;
    }
  </script>

  <footer id="contato" class="footer animate">
      <div class="footer-content">
          <div class="footer-info">
              <h3>Gostou deste projeto?</h3>
              <p>Vamos conversar sobre como posso aplicar essas soluções no seu negócio.</p>
          </div>
          <div class="footer-links">
              <a href="mailto:lucs.pbl290@gmail.com">📧 Email</a>
              <a href="https://github.com/Lucasbig6" target="_blank">🐙 GitHub</a>
              <a href="https://www.linkedin.com/in/lucas-pablo-33885520b" target="_blank">💼 LinkedIn</a>
          </div>
      </div>
      <div class="footer-bottom">
          <p>© 2026 Lucas Pablo • Data Driven Design ⚡</p>
      </div>
  </footer>

  <script>
    // Scroll Reveal for Footer
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = "1";
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate').forEach(el => {
        el.style.opacity = "0";
        el.style.transform = "translateY(30px)";
        el.style.transition = "all 0.8s ease-out";
        observer.observe(el);
    });
  </script>

</body>
</html>
